name: java-ci

on:
  pull_request:
    paths:
      - 'services/sap-integration/**'
      - '.github/workflows/java-ci.yml'
  push:
    branches: [main]
    paths:
      - 'services/sap-integration/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sap-integration
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        run: ./mvnw -B verify
      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: services/sap-integration/target/surefire-reports
